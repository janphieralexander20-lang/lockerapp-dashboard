<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LockerApp FEUST - Panel de Administración</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">

  <header class="bg-purple-800 text-white p-5 shadow-lg flex justify-between items-center">
    <h1 class="text-2xl font-black tracking-wider flex items-center gap-2">
      <span>🔒</span> LOCKERAPP ADMIN
    </h1>
    <div class="flex gap-3">
      <button onclick="exportarExcel()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded font-bold text-sm shadow transition-all">
        📊 Descargar Excel
      </button>
      <button onclick="exportarPDF()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded font-bold text-sm shadow transition-all">
        📄 Descargar PDF
      </button>
      <button onclick="alertaReseteo()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded font-bold text-sm shadow transition-all border border-red-400">
        ⚠️ Formatear Pruebas
      </button>
    </div>
  </header>

  <main class="p-6 max-w-7xl mx-auto" id="area-imprimir">
    
    <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="bg-white p-6 rounded-xl shadow-sm border-l-8 border-green-500">
        <p class="text-gray-500 font-bold uppercase text-xs tracking-wider">Ingresos Recaudados (FEUST)</p>
        <h3 class="text-4xl font-black text-gray-800 mt-2" id="kpi-ingresos">$0</h3>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border-l-8 border-blue-500">
        <p class="text-gray-500 font-bold uppercase text-xs tracking-wider">Contratos Universitarios Activos</p>
        <h3 class="text-4xl font-black text-gray-800 mt-2" id="kpi-contratos">0</h3>
      </div>
    </section>

    <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
      <div class="p-6 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
        <h2 class="text-xl font-extrabold text-gray-800">📚 Base de Datos de Arriendos</h2>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse" id="tabla-exportar">
          <thead>
            <tr class="bg-purple-900 text-white text-xs uppercase font-bold tracking-wider">
              <th class="p-4">Estudiante / Correo</th>
              <th class="p-4">Ubicación y Casillero</th>
              <th class="p-4 text-center">Documentos Legales</th>
              <th class="p-4 text-center">Estado Técnico</th>
            </tr>
          </thead>
          <tbody id="tabla-contratos" class="divide-y divide-gray-200">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    async function cargarPanel() {
      try {
        // Cargar Contratos
        const resContratos = await fetch('https://lockerapp-servidor.onrender.com/api/lockers');
        let contratos = [];
        if (resContratos.ok) contratos = await resContratos.json();

        // Cargar Reportes (Para saber si hay fallas)
        const resReportes = await fetch('https://lockerapp-servidor.onrender.com/api/ver_reportes');
        let reportes = [];
        if (resReportes.ok) reportes = await resReportes.json();
        
        // Actualizar KPIs
        let totalIngresos = contratos.length * 10000; 
        document.getElementById('kpi-ingresos').innerText = `$${totalIngresos.toLocaleString('es-CL')}`;
        document.getElementById('kpi-contratos').innerText = contratos.length;

        const tabla = document.getElementById('tabla-contratos');
        
        if (contratos.length === 0) {
          tabla.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500 font-bold">No hay contratos registrados aún en la base de datos.</td></tr>`;
          return;
        }

        tabla.innerHTML = contratos.map(c => {
          // Verificar si este locker en particular tiene un reporte de falla
          const tieneFalla = reportes.some(r => r.accion.includes(c.n_casillero) || r.correo === c.correo);
          
          const estadoHTML = tieneFalla 
            ? `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold animate-pulse">🚨 Requiere Técnico</span>`
            : `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">✅ Operativo</span>`;

          return `
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="p-4">
              <p class="font-bold text-gray-800 text-sm">${c.correo.split('@')[0].toUpperCase()}</p>
              <p class="text-xs text-gray-500">${c.correo}</p>
            </td>
            <td class="p-4">
              <p class="font-bold text-purple-700 text-lg">Locker #${c.n_casillero || 'N/A'}</p>
              <p class="text-xs text-gray-500 uppercase font-semibold">${c.piso || 'Sede Central'}</p>
            </td>
            <td class="p-4 text-center">
              <div class="flex justify-center gap-2">
                <button onclick="verDoc('Comprobante')" class="bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-all">
                  💰 Comprobante
                </button>
                <button onclick="verDoc('Firma')" class="bg-purple-50 hover:bg-purple-100 text-purple-600 border border-purple-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-all">
                  ✍️ Firma
                </button>
              </div>
            </td>
            <td class="p-4 text-center">
              ${estadoHTML}
            </td>
          </tr>
        `}).join('');

      } catch (error) {
        console.error("Error cargando base de datos:", error);
      }
    }

    function verDoc(tipo) {
      alert(`Abriendo bóveda de seguridad: Mostrando ${tipo} del estudiante para auditoría.`);
    }

    function alertaReseteo() {
      alert("🚨 MODO PRESENTACIÓN 🚨\n\nPara vaciar el panel y dejarlo en cero para tu profesor, abre el 'Table Editor' en tu cuenta de Supabase y borra las filas de la tabla 'contratos_firmados'. El panel se actualizará automáticamente.");
    }

    function exportarExcel() {
      let tabla = document.getElementById("tabla-exportar");
      let libro = XLSX.utils.table_to_book(tabla, {sheet: "Base_de_Datos"});
      XLSX.writeFile(libro, "Contratos_LockerApp_FEUST.xlsx");
    }

    function exportarPDF() {
      let elemento = document.getElementById("area-imprimir");
      let opciones = { margin: 10, filename: 'Reporte_Oficial_LockerApp.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } };
      html2pdf().set(opciones).from(elemento).save();
    }

    cargarPanel();
    setInterval(cargarPanel, 15000);
  </script>
</body>
</html>
